resilience4j:
  circuitbreaker:
    configs:
      backend:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 4
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 1s
    instances:
      items:
        base-config: backend
  timelimiter:
    configs:
      backend:
        timeout-duration: 3s
    instances:
      items:
        base-config: backend